services:

  # ── PHP-FPM application ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: strata_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - PHP_OPCACHE_ENABLE=0   # off for dev hot-reload
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - strata

  # ── Nginx web server ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: strata_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - strata

  # ── MySQL 8 database ─────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: strata_mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-strata}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-strata}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - strata

  # ── Redis (cache + queues + sessions) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: strata_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - strata

  # ── Horizon queue worker ─────────────────────────────────────────────────────
  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: strata_horizon
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    command: php artisan horizon
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - strata

  # ── Meilisearch (full-text search) ───────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: strata_meilisearch
    restart: unless-stopped
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterKey}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - strata

networks:
  strata:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  meilisearch_data:
