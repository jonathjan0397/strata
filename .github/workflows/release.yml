name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release package
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── PHP + Composer ────────────────────────────────────────────────────────
      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo, pdo_mysql, zip, gd, bcmath, intl, opcache
          coverage: none

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ── Node + Vite ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # ── Create release ZIP ────────────────────────────────────────────────────
      - name: Package release ZIP
        run: |
          TAG="${GITHUB_REF_NAME}"
          ZIP="strata-${TAG}.zip"

          zip -r "$ZIP" . \
            --exclude "*.git*" \
            --exclude "*/.git/*" \
            --exclude "*/node_modules/*" \
            --exclude "*/tests/*" \
            --exclude "*/.env*" \
            --exclude "*/storage/logs/*" \
            --exclude "*/storage/framework/cache/data/*" \
            --exclude "*/storage/framework/sessions/*" \
            --exclude "*/storage/framework/views/*" \
            --exclude "*/storage/app/public/*" \
            --exclude "*/.github/*"

          echo "ZIP_NAME=$ZIP" >> "$GITHUB_ENV"

      # ── Publish GitHub Release ────────────────────────────────────────────────
      # Use gh CLI directly so the release is created-or-updated in one step,
      # avoiding the "tag already exists" conflict if someone created a draft
      # release or manually tagged before the workflow ran.
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          ZIP: ${{ env.ZIP_NAME }}
          IS_PRERELEASE: ${{ contains(github.ref_name, 'RC') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          NOTES=$(cat <<'BODY'
          ### Installation
          1. Download `strata-${TAG}.zip` and extract it to your server's web root
          2. Copy `.env.example` to `.env` and fill in your database credentials and `APP_URL`
          3. Visit `/install` to run the browser setup wizard — no CLI required

          ### Upgrade from a previous version
          1. Download and extract this ZIP (your `.env` and `storage/` are preserved)
          2. Visit `/upgrade` to run the browser upgrade wizard — runs migrations automatically

          See [CHANGELOG.md](CHANGELOG.md) for the full list of changes in this release.
          BODY
          )

          # Delete any existing release for this tag (keeps the tag itself)
          gh release delete "$TAG" --yes 2>/dev/null || true

          gh release create "$TAG" "$ZIP" \
            --title "Strata $TAG" \
            --notes "$NOTES" \
            --latest \
            $PRERELEASE_FLAG
