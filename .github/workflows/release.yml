name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release package
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── PHP + Composer ────────────────────────────────────────────────────────
      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo, pdo_mysql, zip, gd, bcmath, intl, opcache
          coverage: none

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ── Node + Vite ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # ── Create release ZIP ────────────────────────────────────────────────────
      - name: Package release ZIP
        run: |
          TAG="${GITHUB_REF_NAME}"
          ZIP="strata-${TAG}.zip"

          zip -r "$ZIP" . \
            --exclude "*.git*" \
            --exclude "*/.git/*" \
            --exclude "*/node_modules/*" \
            --exclude "*/tests/*" \
            --exclude "*/.env*" \
            --exclude "*/storage/logs/*" \
            --exclude "*/storage/framework/cache/data/*" \
            --exclude "*/storage/framework/sessions/*" \
            --exclude "*/storage/framework/views/*" \
            --exclude "*/storage/app/public/*" \
            --exclude "*/.github/*"

          echo "ZIP_NAME=$ZIP" >> "$GITHUB_ENV"

      # ── Publish GitHub Release ────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Strata ${{ github.ref_name }}"
          body: |
            ## Strata Service Billing and Support Platform — ${{ github.ref_name }}

            ### Installation
            1. Upload and extract this ZIP to your server's web root
            2. Copy `.env.example` to `.env` and configure your database and mail settings
            3. Visit `/install` to run the setup wizard

            ### Upgrade from a previous version
            1. Upload and extract this ZIP (your `.env` and `storage/` are preserved)
            2. Visit `/upgrade` to run the upgrade wizard — runs migrations automatically

            See [CHANGELOG.md](CHANGELOG.md) for what's new in this release.
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'RC') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
