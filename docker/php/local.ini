[PHP]
; Development-friendly settings — tighten for production
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; Limits
memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120

; Timezone
date.timezone = UTC

; OPcache (disabled for dev hot-reload — enable in production)
opcache.enable = 0
opcache.enable_cli = 0
