server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.php index.html;

    charset utf-8;

    # Serve static assets directly
    location ~* \.(css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Main routing — pass through to index.php (Laravel)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP requests to php-fpm
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    # Deny dotfiles (except .well-known for ACME/Let's Encrypt)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # Logging
    access_log /var/log/nginx/strata_access.log;
    error_log  /var/log/nginx/strata_error.log;
}
